<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>⚗ List Alchemist</title>

    <style>
        body {
            background-color: #f4ece4;
            padding: 40px;
            color: #4a3728;
            font-family: Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(180, 140, 120, 0.15);
        }

        h1 {
            font-size: 1.8rem;
            color: #b36a5b;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #8c6a56;
        }

        textarea, input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2d1c3;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
            background-color: #fafdfb;
            transition: border-color 0.3s ease;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: #d19a8e;
            background-color: #fff;
        }

        textarea { height: 120px; resize: vertical; }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            background: #d19a8e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background: #b36a5b;
        }

        button:active {
            transform: translateY(1px);
        }

        button>span {
            vertical-align: center;
        }

        fieldset { border: none; padding: 0; margin: 0; }

        .output-container {
            margin-top: 25px;
            background: #e4ebe4;
            color: #3d4f3d;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #b36a5b;
        }

        #qrcode canvas, #qrcode img {
            margin: 0 auto;
            display: block;
        }
    </style>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>
    <div class="container">
    <header>
        <h1>⚗ List Alchemist · <small>A String List Regex Transformer</small></h1>
    </header>

    <div>
        <p>
            <label for="inputList"><strong>Items list</strong></label>
            <textarea id="inputList" rows="5" cols="50" placeholder="">http://www.website.com/page/123
http://www.archive.net/65</textarea>
        </p>

        <p>
            <label for="regexInput"><strong>Regex extraction rule</strong></label>
            <input type="text" id="regexInput" size="50" value="www\.(?<domain>[^.]+)\.[a-z]{2,3}(?:/[^/]+)?/(?<id>\d+)" placeholder='Ex: (?<name>\w+)'>
            <small id="regexError" class="error" style="display:none;"> (Invalid Regex)</small>
        </p>

        <p>
            <label for="templateInput"><strong>Composition template</strong></label>
            <input type="text" id="templateInput" size="50" value='<a href="%s" key="{id}">{domain}</a>' placeholder="Ex: Name: {name}">
        </p>

        <button onclick="transform()">
            <span class="material-symbols-outlined">experiment</span>
            <strong>Transform !</strong>
        </button>

        <br>

        <div class="output-container">
            <label for="outputResult"><strong>Result</strong></label>
            <textarea id="outputResult" rows="5" cols="50" readonly placeholder=""></textarea>
        </div>


        <div>
            <button onclick="generateShareLink()" style="background-color: #6c757d;">
                <span class="material-symbols-outlined">share</span>
                <strong>Generate configuration URL</strong>
            </button>
            <span id="shareMessage" style="display:none; color: green; margin-left: 10px;">URL copied!</span>

            <div id="qrcode-container" style="margin-top: 20px; display: none; text-align: center; flex-direction: column; align-items: center;">
                <p>
                <div id="qrcode"></div>
                <p><small>configuration QR code</small></p>
            </div>

        </div>
    </div>
</div>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);

        const regexParam = urlParams.get('regex');
        const templateParam = urlParams.get('template');
        const inputParam = urlParams.get('list');

        if (regexParam) document.getElementById('regexInput').value = regexParam;
        if (templateParam) document.getElementById('templateInput').value = templateParam;
        if (inputParam) document.getElementById('inputList').value = inputParam;

        if (regexParam || templateParam) {
            transform();
        }
    };

    function generateShareLink() {
        /* Create URL parameters, update current URL and copy to clipboard. */

        const regex = document.getElementById('regexInput').value;
        const template = document.getElementById('templateInput').value;
        // const list = document.getElementById('inputList').value;

        const url = new URL(window.location.href.split('?')[0]);
        url.searchParams.set('regex', regex);
        url.searchParams.set('template', template);
        // url.searchParams.set('list', list);

        const fullUrl = url.toString();

        navigator.clipboard.writeText(fullUrl).then(() => {
            const msg = document.getElementById('shareMessage');
            msg.style.display = 'inline';
            setTimeout(() => { msg.style.display = 'none'; }, 2000);
        });

        window.history.pushState({}, '', url);

        /* Generate a configuration QR code. */

        const qrContainer = document.getElementById('qrcode-container');
        const qrImg = document.getElementById('qrcode');

        qrImg.innerHTML = "";
        new QRCode(qrImg, {
            text: fullUrl,
            width: 256,
            height: 256,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
        qrContainer.style.display = 'inline';
    }

    function transform() {
        const inputList = document.getElementById('inputList').value.split('\n');
        const regexStr = document.getElementById('regexInput').value;
        const template = document.getElementById('templateInput').value;
        const outputArea = document.getElementById('outputResult');
        const errorDiv = document.getElementById('regexError');

        errorDiv.style.display = 'none';
        let results = [];

        try {
            const re = new RegExp(regexStr);

            inputList.forEach(line => {
                if (line.trim() === "") return;

                const match = line.match(re);
                if (match && match.groups) {
                    let formatted = template;
                    formatted = formatted.replaceAll(`%s`, line)
                    Object.keys(match.groups).forEach(key => {
                        const val = match.groups[key] || "";
                        formatted = formatted.replaceAll(`{${key}}`, val);
                    });
                    results.push(formatted);
                } else {
                    results.push("No match found for: " + line);
                }
            });

            outputArea.value = results.join('\n');
        } catch (e) {
            errorDiv.style.display = 'block';
            errorDiv.innerText = "Regex error: " + e.message;
        }
    }
</script>

</body>
</html>
